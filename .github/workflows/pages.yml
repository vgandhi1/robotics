name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble combined _site tree
        run: |
          mkdir -p _site/RL-Pendulum _site/Semantic-SLAM-Rover _site/VLA-bench
          cp RL-Pendulum/presentation.html         _site/RL-Pendulum/index.html
          cp Semantic-SLAM-Rover/presentation.html _site/Semantic-SLAM-Rover/index.html
          cp VLA-bench/presentation.html           _site/VLA-bench/index.html
          cat > _site/index.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>robotics — Robotics Algorithms Pillar</title>
          <style>body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#07060f;color:#faf5ff;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
          .wrap{max-width:760px;text-align:center}h1{font-size:2rem;margin:0 0 8px}p{color:#a8a29e;margin:0 0 28px}
          .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
          a.card{display:block;padding:22px;border-radius:12px;background:#0f0e18;border:1px solid rgba(168,85,247,.25);border-top:3px solid #a855f7;color:#faf5ff;text-decoration:none;text-align:left}
          a.card h3{margin:0 0 6px;font-size:.95rem}a.card span{color:#a8a29e;font-size:.8rem}
          @media(max-width:700px){.cards{grid-template-columns:1fr}}</style></head>
          <body><div class="wrap"><h1>robotics</h1>
          <p>Robotics algorithms pillar — train → deploy → perceive.</p>
          <div class="cards">
          <a class="card" href="VLA-bench/"><h3>VLA-bench</h3><span>Vision-Language-Action training profiler — 3.3× throughput</span></a>
          <a class="card" href="RL-Pendulum/"><h3>RL-Pendulum</h3><span>Sim-to-real RL → $5 ESP32 @ 100Hz</span></a>
          <a class="card" href="Semantic-SLAM-Rover/"><h3>Semantic SLAM Rover</h3><span>YOLOv8 + LiDAR semantic navigation on Jetson</span></a>
          </div></div></body></html>
          HTML

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
